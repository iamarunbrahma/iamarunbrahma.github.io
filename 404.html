<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 Page not found | Arun Brahma</title>
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#ffffff" />

    <!-- Premium serif webfont -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600&amp;display=swap"
    />

    <style>
      :root {
        --bg: #ffffff;
        --text: #1f1d1b;
        --muted: #6e6a64;
        --ghost: #e4ded0;
        --link: #14538d;
        --link-hover: #0d3a64;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--text);
        font-family: "Source Serif 4", Georgia, Cambria, "Times New Roman", Times, serif;
        font-size: 19px;
        line-height: 1.6;
        font-feature-settings: "kern", "liga";
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      .box { max-width: 560px; padding: 32px 24px; text-align: center; }
      .big404 {
        font-size: clamp(110px, 20vw, 168px);
        font-weight: 600;
        line-height: 1;
        letter-spacing: -0.02em;
        color: var(--ghost);
        margin-bottom: 8px;
      }
      h1 {
        font-size: 26px; font-weight: 600; letter-spacing: -0.012em;
        margin: 0 0 10px;
      }
      .sub { color: var(--muted); margin: 0 0 26px; }
      .back { margin: 0; font-size: 16px; }
      a {
        color: var(--link);
        text-decoration: underline;
        text-decoration-thickness: 1px;
        text-underline-offset: 2.5px;
        transition: color 0.15s ease;
      }
      a:hover { color: var(--link-hover); }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="big404">404</div>
      <h1>Page not found</h1>
      <p class="sub">This page doesn&rsquo;t exist or has been moved.</p>
      <p class="back"><a href="/">&larr; Back to arunbrahma.com</a></p>
    </div>
  </body>
</html>
